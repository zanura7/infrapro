name: projek-infra

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: projek-infra-app:latest
    container_name: projek-infra-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: projek-infra-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/html/storage:ro
      - app-public:/var/www/html/public/storage:ro
    depends_on:
      - app
    networks:
      - internal

  mysql:
    image: mysql:8.4
    container_name: projek-infra-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-projek_infra}"
      MYSQL_USER: "${DB_USERNAME:-projek}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-changeme}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-changeme-root}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-changeme-root}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: projek-infra-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal

  queue:
    image: projek-infra-app:latest
    container_name: projek-infra-queue
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --tries=3 --max-time=3600 --sleep=2
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public/storage
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - internal

  scheduler:
    image: projek-infra-app:latest
    container_name: projek-infra-scheduler
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ""
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public/storage
    depends_on:
      app:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  app-storage:
  app-public:
